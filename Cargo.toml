[package]
name = "barefoot"
version = "0.1.0"
edition = "2021"
authors = ["Barefoot Team"]
description = "A modern, flexible runner system for GitHub-like services and Jujutsu"
license = "MIT"
repository = "https://github.com/barefoot/barefoot"
keywords = ["runner", "ci", "cd", "github-actions", "jujutsu"]
categories = ["development-tools"]

[dependencies]
# Async runtime
tokio = { version = "1.0", features = ["full"] }

# HTTP client
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Configuration
config = "0.14"
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4.0", features = ["derive"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async traits
async-trait = "0.1"

# File system operations
walkdir = "2.4"

# Process management
which = "6.0"

# YAML parsing
serde_yaml = "0.9"

# UUID generation
uuid = { version = "1.0", features = ["v4", "serde"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Crypto
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
rand = "0.8"

# Environment variables
dotenvy = "0.15"

# URL parsing
url = "2.4"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"

[[bin]]
name = "barefoot"
path = "src/main.rs"

[lib]
name = "barefoot"
path = "src/lib.rs"
