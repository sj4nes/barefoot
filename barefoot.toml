# Barefoot Runner Configuration
# This file contains the configuration for the barefoot runner

[runner]
name = "barefoot-runner"
url = "http://localhost:8080"
token = ""  # Set your runner token here
labels = ["self-hosted", "macos", "rust"]
max_concurrent_jobs = 2
work_dir = "./work"
container_backend = "native"
container_backend_opts = {}
container_cleanup = { enabled = true, interval_minutes = 60, max_usage_bytes = 50000000000 }

[runner.capabilities]
os = "macos"
architecture = "x86_64"
labels = ["self-hosted", "macos", "rust"]
features = { "docker" = "false", "gpu" = "false", "rust" = "true" }

[service]
service_type = "Jujutsu"
url = "."
token = ""  # Not required for local Jujutsu jobs
api_version = ""
custom_headers = {}

[logging]
level = "info"
format = "json"

[security]
enable_ssl_verification = true
allowed_origins = ["*"]
max_upload_size = 104857600  # 100MB 