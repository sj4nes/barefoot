# Barefoot Runner Configuration
# This file contains the configuration for the barefoot runner

[runner]
name = "barefoot-runner"
url = "http://localhost:8080"
token = ""  # Set your runner token here
labels = ["self-hosted", "linux", "rust"]
max_concurrent_jobs = 2
work_dir = "./work"

[runner.capabilities]
os = "linux"
architecture = "x86_64"
labels = ["self-hosted", "linux", "rust"]
features = { "docker" = "true", "gpu" = "false", "rust" = "true" }

[service]
service_type = "GitHub"
url = "https://api.github.com"
token = ""  # Set your service token here
api_version = "2022-11-28"
custom_headers = {}

[logging]
level = "info"
format = "json"
file = null

[security]
enable_ssl_verification = true
allowed_origins = ["*"]
max_upload_size = 104857600  # 100MB 